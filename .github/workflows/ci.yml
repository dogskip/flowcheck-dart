name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 주 1회 의존성 갱신 확인 (월요일 09:00 UTC).
    - cron: '0 9 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: [stable, beta]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}
      - run: dart pub get
      - name: Analyze
        run: dart analyze
      - name: Test
        run: dart test

  format-check:
    runs-on: ubuntu-latest
    # dart format으로 코드 스타일 일관성 검증.
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

  outdated-check:
    runs-on: ubuntu-latest
    # 의존성 만료 확인.
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Check outdated
        run: dart pub outdated --no-dev-dependencies --up-to-date
